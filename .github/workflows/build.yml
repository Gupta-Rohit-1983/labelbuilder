name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # ubuntu: fast feedback; windows: the actual target platform
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          # registers the installed JDK in ~/.m2/toolchains.xml, satisfying our toolchain requirement
          mvn-toolchain-vendor: temurin

      - name: Make wrapper executable
        if: runner.os != 'Windows'
        run: chmod +x mvnw

      - name: Build and verify
        run: ./mvnw -B -ntp clean verify
